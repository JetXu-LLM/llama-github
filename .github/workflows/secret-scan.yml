name: Secret Scan

on: [push, pull_request]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        run: |
          archive="gitleaks_8.30.1_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/${archive}"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  ${archive}" | sha256sum --check --strict
          tar -xzf "${archive}" gitleaks
          install -m 0755 gitleaks "${RUNNER_TEMP}/gitleaks"

      - name: Run Gitleaks
        run: |
          "${RUNNER_TEMP}/gitleaks" git --log-opts=--all --config .github/gitleaks.toml --redact
