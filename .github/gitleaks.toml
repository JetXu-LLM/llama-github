title = "gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "llama-jina-api-key"
description = "Jina AI API Key"
regex = '''jina_[a-zA-Z0-9]{32}[a-zA-Z0-9]{16}'''
tags = ["apikey"]

[[allowlists]]
description = "Synthetic anonymizer fixture"
regexTarget = "match"
regexes = ['''sk-1234567890abcdef1234567890abcdef''']
